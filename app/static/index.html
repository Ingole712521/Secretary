<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis OS — Voice Agent</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121820;
      --border: #1e2a38;
      --text: #e8eef5;
      --muted: #8fa3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --danger: #ef4444;
      --user: #1a3a5c;
      --jarvis: #162032;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header h1 span { color: var(--accent); }
    .status { font-size: 0.85rem; color: var(--muted); }
    .status.ok { color: var(--success); }
    .status.err { color: var(--danger); }
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 0;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      min-height: 0;
    }
    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; }
      aside { display: none; }
    }
    #messages {
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 0;
    }
    .msg {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user { align-self: flex-end; background: var(--user); }
    .msg.jarvis { align-self: flex-start; background: var(--jarvis); border: 1px solid var(--border); }
    .msg .role { font-size: 0.7rem; text-transform: uppercase; color: var(--muted); margin-bottom: 0.25rem; }
    aside {
      border-left: 1px solid var(--border);
      background: var(--panel);
      padding: 1rem;
      overflow-y: auto;
    }
    aside h2 { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.75rem; text-transform: uppercase; }
    #tool-log { font-size: 0.8rem; color: var(--muted); }
    #tool-log .tool { padding: 0.5rem; background: var(--bg); border-radius: 6px; margin-bottom: 0.5rem; }
    footer {
      border-top: 1px solid var(--border);
      padding: 1rem 1.5rem;
      background: var(--panel);
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }
    textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font: inherit;
      resize: none;
      min-height: 48px;
      max-height: 120px;
    }
    textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
    button {
      border: none;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font: inherit;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-mic {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--border);
      color: var(--text);
      font-size: 1.25rem;
      padding: 0;
    }
    .btn-mic.listening { border-color: var(--danger); background: #3a1515; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: 0.7; } }
    .options { display: flex; gap: 1rem; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.35rem; cursor: pointer; }
    .empty { color: var(--muted); text-align: center; padding: 2rem; }
  </style>
</head>
<body>
  <header>
    <h1><span>Jarvis</span> OS — Voice Agent</h1>
    <div id="conn-status" class="status">Connecting…</div>
  </header>
  <main>
    <div id="messages">
      <div class="empty" id="welcome">
        Say <strong>"Hey Jarvis"</strong> or type a task.<br />
        Try: <em>"Open my React Native project"</em> — I'll use tools when enabled.
      </div>
    </div>
    <aside>
      <h2>Tool actions</h2>
      <div id="tool-log"><em>No tools used yet.</em></div>
    </aside>
  </main>
  <footer>
    <div style="flex:1;display:flex;flex-direction:column;gap:0.5rem;">
      <div class="options">
        <label><input type="checkbox" id="enable-tools" checked /> Enable PC tools</label>
        <label><input type="checkbox" id="auto-speak" checked /> Speak replies</label>
      </div>
      <div style="display:flex;gap:0.5rem;">
        <textarea id="input" rows="1" placeholder="Ask Jarvis anything…"></textarea>
        <button type="button" class="btn-mic" id="mic-btn" title="Voice input">🎤</button>
        <button type="button" class="btn-primary" id="send-btn">Send</button>
      </div>
    </div>
  </footer>
  <script>
    const API = window.location.origin;
    let conversationId = null;
    let listening = false;
    let recognition = null;
    let busy = false;

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");
    const micBtn = document.getElementById("mic-btn");
    const statusEl = document.getElementById("conn-status");
    const toolLogEl = document.getElementById("tool-log");
    const welcomeEl = document.getElementById("welcome");

    function initSpeech() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        micBtn.title = "Speech recognition not supported in this browser";
        micBtn.disabled = true;
        return;
      }
      recognition = new SR();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = "en-US";
      recognition.onresult = (e) => {
        const text = e.results[0][0].transcript.trim();
        if (text) {
          inputEl.value = text;
          sendMessage(text);
        }
      };
      recognition.onend = () => {
        listening = false;
        micBtn.classList.remove("listening");
      };
      recognition.onerror = () => {
        listening = false;
        micBtn.classList.remove("listening");
      };
    }

    function addMessage(role, text) {
      if (welcomeEl) welcomeEl.remove();
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.innerHTML = `<div class="role">${role === "user" ? "You" : "Jarvis"}</div>${escapeHtml(text)}`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function logTools(tools) {
      if (!tools || !tools.length) return;
      toolLogEl.innerHTML = "";
      tools.forEach((t) => {
        const d = document.createElement("div");
        d.className = "tool";
        d.textContent = `${t.tool_id}: ${t.message || t.status}`;
        toolLogEl.appendChild(d);
      });
    }

    async function speak(text) {
      if (!document.getElementById("auto-speak").checked || !text) return;
      try {
        const res = await fetch(`${API}/api/v1/voice/synthesize`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) return;
        const data = await res.json();
        const audio = new Audio(`data:audio/${data.format};base64,${data.audio_base64}`);
        await audio.play();
      } catch (_) { /* fallback silent */ }
    }

    async function sendMessage(overrideText) {
      const message = (overrideText || inputEl.value).trim();
      if (!message || busy) return;
      busy = true;
      sendBtn.disabled = true;
      inputEl.value = "";
      addMessage("user", message);

      try {
        const res = await fetch(`${API}/api/v1/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message,
            conversation_id: conversationId,
            enable_tools: document.getElementById("enable-tools").checked,
            confirm: true,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          const err = data.error?.message || "Request failed";
          addMessage("jarvis", `Error: ${err}`);
          return;
        }
        conversationId = data.conversation_id;
        addMessage("jarvis", data.message);
        if (data.tools_used?.length) logTools(data.tools_used);
        if (data.confirmation_required) {
          addMessage("jarvis", `⚠ Tool confirmation needed: ${data.pending_tool_id || "action"}`);
        }
        await speak(data.message);
      } catch (e) {
        addMessage("jarvis", `Connection error: ${e.message}`);
      } finally {
        busy = false;
        sendBtn.disabled = false;
      }
    }

    async function checkHealth() {
      try {
        const res = await fetch(`${API}/health`);
        if (res.ok) {
          statusEl.textContent = "Online — free voice via browser + Edge TTS";
          statusEl.className = "status ok";
        } else throw new Error();
      } catch {
        statusEl.textContent = "Offline — start server: python main.py";
        statusEl.className = "status err";
      }
    }

    micBtn.addEventListener("click", () => {
      if (!recognition || busy) return;
      if (listening) {
        recognition.stop();
        return;
      }
      listening = true;
      micBtn.classList.add("listening");
      recognition.start();
    });

    sendBtn.addEventListener("click", () => sendMessage());
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    initSpeech();
    checkHealth();
  </script>
</body>
</html>
